<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        script-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        connect-src 'self';
      "
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/profile.png" />

    <!-- Primary Meta -->
    <title>Ryodgie — Web Designer, Front-end Developer, UI / Visual</title>
    <meta
      name="description"
      content="Portfolio of Ryodgie Barnatia, Web / UI / Visual Designer and Front-end Developer based in the Philippines. Crafting interfaces and identities."
    />
    <meta name="author" content="Ryodgie Barnatia" />
    <meta name="theme-color" content="#f1f4f5" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.ryodgie.com" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ryodgie Barnatia" />
    <meta
      property="og:title"
      content="Ryodgie — Web Design, UI / Visual, Front-end Developer"
    />
    <meta
      property="og:description"
      content="Crafting interfaces and identities. Web Design, UI / Visual, Front-end Developer based in the Philippines."
    />
    <meta property="og:image" content="https://www.ryodgie.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Ryodgie Barnatia — Portfolio" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ryodgie.com" />
    <meta property="og:locale" content="en_US" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Caveat&display=swap"
      rel="stylesheet"
    />

    <!-- LCP preload -->
    <link rel="preload" as="image" href="/profile.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
